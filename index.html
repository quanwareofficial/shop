<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuanWare</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: #000;
    }
    .wrap {
      position: fixed;
      top: -45px;              /* pushes the Google banner off-screen */
      left: 0;
      width: 100%;
      height: calc(100% + 45px);
      overflow: hidden;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <iframe
      src="https://script.google.com/macros/s/AKfycbykj3OzPT0mMW1cbatTxco2cpWUM-_zhz9FAoyTlJXR-eUimEq4x9ZdiwO2Y75Jk8ro/exec"
      allow="clipboard-read; clipboard-write; fullscreen"
      allowfullscreen
      referrerpolicy="no-referrer">
    </iframe>
  </div>
</body>
</html>
